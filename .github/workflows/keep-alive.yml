name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 10 * * *'    # 每天 UTC 10:00 执行（北京时间 18:00）
  workflow_dispatch:         # 支持手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Restore Supabase Project
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/iodfxczhadjoarnobazq/restore")
          echo "Restore response: $STATUS"
